<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кыз Куумай: Онлайн Оюн | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        
        body {
            background: #020617;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .track {
            position: relative;
            height: 250px;
            background: linear-gradient(transparent 50%, rgba(245, 158, 11, 0.05) 80%, rgba(59, 130, 246, 0.15) 100%);
            border-bottom: 4px solid #1e293b;
            overflow: hidden;
        }

        /* Аттардын стили жана жумшак жылышы */
        .horse {
            position: absolute;
            bottom: 25px;
            transition: left 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            font-size: 3.5rem;
            user-select: none;
        }

        #rider { left: 5%; z-index: 10; filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.6)); }
        #girl { left: 75%; filter: drop-shadow(0 0 12px #f472b6); }

        /* Жолдогу ак сызыктардын артка чуркап, Кыймыл эффектин берүүсү */
        .road-line {
            position: absolute;
            width: 8px;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            transform: skewX(-25deg);
            animation: moveLines 2s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateX(200px) skewX(-25deg); }
            100% { transform: translateX(-1200px) skewX(-25deg); }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-answer {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
        }

        .btn-answer:hover {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-color: #60a5fa;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="track mt-6">
        <div class="road-line" style="left: 20%;"></div>
        <div class="road-line" style="left: 50%;"></div>
        <div class="road-line" style="left: 80%;"></div>
        <div class="road-line" style="left: 110%;"></div>

        <div id="girl" class="horse">🏇‍♀️</div>
        <div id="rider" class="horse">🏇‍♂️</div>
        
        <div class="absolute top-4 left-6 bg-black/40 border border-white/10 px-4 py-2 rounded-xl backdrop-blur-md">
            <span class="text-[10px] font-bold text-amber-400 uppercase tracking-widest block">Тема:</span>
            <span id="active-topic-title" class="text-xs font-bold text-white">Жүктөлүүдө...</span>
        </div>

        <div class="absolute top-4 right-6 bg-black/40 border border-white/10 px-4 py-2 rounded-xl backdrop-blur-md text-right">
            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest block">Аралык:</span>
            <span id="distance-counter" class="text-xs font-black text-white">Суроо: 1/20</span>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-3xl glass-panel p-6 md:p-8 rounded-[2.5rem] text-center shadow-2xl relative overflow-hidden">
            
            <div id="loading-ui" class="py-12 space-y-4">
                <div class="animate-spin text-4xl text-amber-400"><i class="fas fa-circle-notch"></i></div>
                <p class="text-sm text-gray-400">Firebase базасынан суроолор жүктөлүүдө...</p>
            </div>

            <div id="game-ui" class="hidden animate-fade-in">
                <p id="question-text" class="text-xl md:text-2xl font-bold mb-8 leading-relaxed text-slate-100">Суроо тексти бул жерге чыгат...</p>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="win-screen" class="hidden space-y-6 py-8">
                <div class="text-6xl text-pink-500 animate-bounce"><i class="fas fa-heart"></i></div>
                <h2 class="text-4xl font-black text-pink-500 uppercase tracking-wider">ЖЕТТИҢИЗ! 🎉</h2>
                <p class="text-slate-300 text-sm max-w-md mx-auto">Куттуктайбыз! Сиз бардык суроолорго туура жооп берип, кызды кууп жеттиңиз жана улуттук оюндун жеңүүчүсү болдуңуз!</p>
                <div class="pt-4">
                    <button onclick="location.reload()" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-xl font-black text-xs uppercase tracking-widest transition-all transform hover:-translate-y-0.5">
                        Кайрадан ойноо <i class="fas fa-redo ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Firebase байланыш жөндөөлөрү
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Браузердин дарегинен (URL) параметрлерди таап алуу
        const urlParams = new URLSearchParams(window.location.search);
        let subjectParam = urlParams.get('subject') || "Физика";
        let topicParam = urlParams.get('topic') || "Механика (Динамика жана Кинематика)";

        // Негизги глобалдык өзгөрмөлөр
        let gameQuestions = [];
        let currentIdx = 0;
        let riderPos = 5;  // Жигиттин баштапкы орду (%)
        let girlPos = 80;  // Кыздын орду (%)
        let stepsCount = 20; // Суроолордун жалпы санына жараша кадам эсептелет

        // Эгер база бош болсо же интернет жок болсо иштөөчү КҮҮГӨ КЕЛТИРИЛГЕН КАМДЫК СУРООЛОР
        const fallbackQuestions = [
            { question: "Ылдамдыктын бирдиги кайсы?", options: ["м/с", "кг", "Н", "Па"], answer: "м/с" },
            { question: "Күчтү эмне менен өлчөйбүз?", options: ["Динамометр", "Термометр", "Барометр", "Сызыкчы"], answer: "Динамометр" },
            { question: "Инерция деген эмне?", options: ["Ылдамдыкты сактоо кубулушу", "Нерсенин кыймылы", "Тынчтык абалы", "Токтоо"], answer: "Ылдамдыкты сактоо кубулушу" },
            { question: "Басымдын формуласы кайсы?", options: ["P=F/S", "F=ma", "E=mc²", "v=s/t"], answer: "P=F/S" },
            { question: "Ньютондун 2-законунун формуласы кайсы?", options: ["F=ma", "P=mv", "E=mgh", "U=IR"], answer: "F=ma" }
        ];

        // Баракча ачылаар замат ишке кирүүчү функция
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('active-topic-title').innerText = `${subjectParam} -> ${topicParam}`;
            loadQuizDataFromFirebase();
        });

        // Firebase Realtime Database'ден суроолорду жүктөө
        function loadQuizDataFromFirebase() {
            const quizRef = database.ref('kyzKuumayQuiz/' + subjectParam + '/' + topicParam + '/questions');
            
            quizRef.once('value').then((snapshot) => {
                if (snapshot.exists() && Array.isArray(snapshot.val())) {
                    gameQuestions = snapshot.val();
                    console.log("Суроолор ийгиликтүү жүктөлдү:", gameQuestions.length);
                } else {
                    console.warn("Мугалим суроо киргизе элек же ката бар. Камдык суроолор иштетилди.");
                    gameQuestions = fallbackQuestions;
                }
                startGameEngine();
            }).catch((error) => {
                console.error("Firebase катасы:", error);
                gameQuestions = fallbackQuestions;
                startGameEngine();
            });
        }

        // Оюнду баштоо жана спиннерди өчүрүү
        function startGameEngine() {
            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            stepsCount = gameQuestions.length;
            displayQuestion();
        }

        // Суроону жана варианттарды экранга чыгаруу
        function displayQuestion() {
            if (currentIdx >= gameQuestions.length) {
                // Эгер суроолор бүтсө бирок кууп жете элек болсо, камдык айлампа кылабыз
                currentIdx = 0; 
            }

            const currentQuiz = gameQuestions[currentIdx];
            document.getElementById('question-text').innerText = currentQuiz.question;
            document.getElementById('distance-counter').innerText = `Суроо: ${currentIdx + 1}/${stepsCount}`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            // Базадан келген варианттарды мугалим киргизген тартипте эмес, аралаштырып чыгаруу
            let shuffledOptions = [...currentQuiz.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach((optionText) => {
                if (!optionText) return; // Бош варианттарды кошпоо
                
                const btn = document.createElement('button');
                btn.className = 'btn-answer p-4 md:p-5 rounded-2xl font-bold text-sm md:text-base text-left flex items-center gap-3';
                btn.innerHTML = `<span class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center text-xs text-gray-400 font-black"><i class="fas fa-chevron-right"></i></span> ${optionText}`;
                btn.onclick = () => checkSelectedAnswer(optionText, currentQuiz.answer);
                grid.appendChild(btn);
            });
        }

        // Жоопту текшерүү
        function checkSelectedAnswer(selectedOption, correctAnswer) {
            if (selectedOption === correctAnswer) {
                // ТУУРА ЖООП: Жигит алдыга жылат
                // Ар бир туура жоопто кызга жакындай турган пайыздык кадам эсептелет
                let stepSize = (girlPos - 5) / stepsCount;
                riderPos += stepSize;
                
                document.getElementById('rider').style.left = riderPos + '%';
                currentIdx++;

                // Жеңишти текшерүү
                if (riderPos >= (girlPos - 4)) {
                    triggerWinState();
                } else {
                    // Кийинки суроого өтүү
                    setTimeout(displayQuestion, 300);
                }
            } else {
                // КАТА ЖООП: Ат артка чегинет (минимум 5% ордунда калат)
                riderPos = Math.max(5, riderPos - 6);
                document.getElementById('rider').style.left = riderPos + '%';
                
                // Колдонуучуга визуалдык ката сигналын көрсөтүү
                alert("Ката жооп! Ат чалынып, артка кайтты.");
            }
        }

        // Оюн жеңиш менен аяктаганда
        function triggerWinState() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            
            // Аттарды кучакташкан абалга келтирүү
            document.getElementById('rider').style.left = (girlPos - 2) + '%';
            document.getElementById('girl').innerText = "💖";
            document.getElementById('rider').innerText = "🏇‍♂️";
        }
    </script>
</body>
</html>
