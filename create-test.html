<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Конструктору | BILIMAL.ORG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { background-color: #050a18; color: #e2e8f0; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .kyrgyz-btn { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .kyrgyz-btn:hover { background: #3b82f6; color: white; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1495571814896964" crossorigin="anonymous"></script>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-3xl glass-card p-6 md:p-8 rounded-[2.5rem]">
        <div class="flex justify-between items-center mb-6">
            <h2 id="page-title" class="text-2xl font-black text-blue-500 uppercase tracking-tight">BILIMAL Конструктор</h2>
            <a href="teacher-dashboard.html" class="text-gray-400 hover:text-white text-sm"><i class="fas fa-arrow-left mr-2"></i> Кайтуу</a>
        </div>

        <div class="p-6 bg-white/5 rounded-2xl border border-white/5 mb-6 space-y-4">
            <h3 class="text-sm font-black uppercase tracking-widest text-blue-400"><i class="fas fa-sliders-h mr-2"></i> Жөндөөлөр жана Баалоо ченемдери</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase mb-2">Таймер (мүнөт)</label>
                    <input id="quiz-time" type="number" value="20" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white focus:outline-none">
                </div>
                <div class="flex items-center gap-3 pt-6">
                    <input id="shuffle-questions" type="checkbox" class="w-5 h-5 text-blue-600 bg-white/5 border-white/10 rounded">
                    <label class="text-xs text-gray-300 font-bold uppercase cursor-pointer" for="shuffle-questions">Аралаштыруу</label>
                </div>
                <div class="flex items-center gap-3 pt-6">
                    <input id="show-results-instantly" type="checkbox" checked class="w-5 h-5 text-blue-600 bg-white/5 border-white/10 rounded">
                    <label class="text-xs text-gray-300 font-bold uppercase cursor-pointer" for="show-results-instantly">Жыйынтыкты көрсөтүү</label>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-2 border-t border-white/5">
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold uppercase mb-1">"5" деген баа үчүн (%)</label>
                    <input id="grade-5-min" type="number" value="85" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-sm text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold uppercase mb-1">"4" деген баа үчүн (%)</label>
                    <input id="grade-4-min" type="number" value="70" class="w-full bg-white/5 border border-white/10 rounded-xl p-2.5 text-sm text-white focus:outline-none">
                </div>
            </div>
        </div>

        <div class="p-4 bg-blue-900/10 border border-blue-500/20 rounded-2xl mb-6 flex flex-col sm:flex-row items-center justify-between gap-3">
            <span class="text-xs font-bold text-blue-400 uppercase tracking-wider"><i class="fas fa-keyboard mr-2"></i> Кыргыз тамгалары:</span>
            <div class="flex gap-2">
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ө')">Ө</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ө')">ө</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ү')">Ү</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ү')">ү</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('Ң')">Ң</button>
                <button type="button" class="kyrgyz-btn" onclick="insertChar('ң')">ң</button>
            </div>
        </div>

        <div class="space-y-4 mb-6">
            <label class="block text-xs font-bold uppercase text-gray-400">Тесттин аталышы</label>
            <input id="quiz-title-input" type="text" placeholder="Мисалы: Кыргыз тили - Эсептик сан атоочтор" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 font-bold">
        </div>

        <div id="questions-list" class="space-y-6 mb-6"></div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="addQuestionField('choice')" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white border border-blue-500/30 py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-all">
                + Варианттуу суроо
            </button>
            <button onclick="addQuestionField('text')" class="bg-purple-600/20 hover:bg-purple-600 text-purple-400 hover:text-white border border-purple-500/30 py-3.5 rounded-xl font-bold text-xs uppercase tracking-wider transition-all">
                + Ачык суроо (Эссе)
            </button>
        </div>

        <button onclick="saveQuizToFirebase()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-4 rounded-xl font-black text-xs uppercase tracking-widest transition-all">
            Тестти сактоо жана жарыялоо
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsRjj_5VoQwZA7hSBWhkQ58UvUnct-b28",
            authDomain: "bilimal-org.firebaseapp.com",
            databaseURL: "https://bilimal-org-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bilimal-org",
            storageBucket: "bilimal-org.firebasestorage.app",
            appId: "1:241750360816:web:a991434eb5afbc470d7835"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUserId = null, lastFocusedInput = null, editQuizId = new URLSearchParams(window.location.search).get('edit'), questionCount = 0;
        
        auth.onAuthStateChanged(user => { 
            if (user) { currentUserId = user.uid; if(editQuizId) loadExistingQuizData(); else addQuestionField('choice'); }
            else window.location.href = 'login.html';
        });

        document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT') lastFocusedInput = e.target; });

        function insertChar(char) {
            if (lastFocusedInput) {
                const start = lastFocusedInput.selectionStart;
                const end = lastFocusedInput.selectionEnd;
                lastFocusedInput.value = lastFocusedInput.value.substring(0, start) + char + lastFocusedInput.value.substring(end);
                lastFocusedInput.focus();
                lastFocusedInput.setSelectionRange(start + 1, start + 1);
            }
        }

        // Суроо талаасын кошуу (Аралаштыруу баскычы кошулду)
        function addQuestionField(type = 'choice', text = "", options = ["", "", "", ""], correct = "") {
            questionCount++;
            const container = document.getElementById('questions-list');
            
            let contentHtml = type === 'choice' ? `
                <div class="space-y-2 options-container">
                    <input type="text" value="${options[0]||''}" placeholder="Вариант А" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                    <input type="text" value="${options[1]||''}" placeholder="Вариант Б" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                    <input type="text" value="${options[2]||''}" placeholder="Вариант В" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                    <input type="text" value="${options[3]||''}" placeholder="Вариант Г" class="q-opt w-full bg-white/5 border border-white/5 rounded-xl p-2 text-sm text-white">
                </div>
                <input type="number" value="${correct}" placeholder="Туура варианттын индекси (0, 1, 2 же 3)" class="q-correct w-full bg-blue-500/10 border border-blue-500/20 rounded-xl p-2 text-xs text-blue-400 mt-3 focus:outline-none">` 
            : `<p class="text-xs text-gray-500 italic bg-white/5 p-3 rounded-xl border border-white/5">Окуучу өзү колдон жооп жазат.</p>`;

            // Жоопторду аралаштыруучу баскыч Trash себеттин сол тарабына жайгаштырылды
            let shuffleBtnHtml = type === 'choice' ? `
                <button type="button" onclick="shuffleQuestionOptions(this)" class="text-xs text-amber-400 hover:text-amber-300 flex items-center gap-1 border border-amber-500/20 bg-amber-500/5 px-2.5 py-1 rounded-lg transition-all mr-2">
                    <i class="fas fa-random"></i> Аралаштыруу
                </button>` : '';

            container.insertAdjacentHTML('beforeend', `
                <div class="p-6 bg-white/5 rounded-2xl border border-white/5 relative question-item" data-type="${type}">
                    <div class="flex justify-between items-center mb-3">
                        <p class="text-xs font-bold text-blue-400 uppercase">Суроо #${questionCount}</p>
                        <div class="flex items-center">
                            ${shuffleBtnHtml}
                            <button onclick="this.parentElement.parentElement.parentElement.remove(); reindexQuestions();" class="text-xs text-red-400 hover:text-red-300 p-1"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <input type="text" value="${text}" placeholder="Суроону жазыңыз..." class="q-text w-full bg-white/10 border border-white/5 rounded-xl p-3 text-white mb-3 focus:outline-none font-semibold">
                    ${contentHtml}
                </div>`);
        }

        // ЖОПТОРДУ АРАЛАШТЫРУУЧУ ЖАҢЫ ЛОГИКАЛЫК ФУНКЦИЯ
        function shuffleQuestionOptions(buttonElement) {
            // Баскыч жайгашкан суроонун негизги блогун табабыз
            const questionItem = buttonElement.closest('.question-item');
            if (!questionItem) return;

            // Учурдагы 4 варианттын киргизүү талааларын (input) алабыз
            const optionInputs = questionItem.querySelectorAll('.q-opt');
            const correctInput = questionItem.querySelector('.q-correct');
            
            // Варианттардын тексттерин массивге чогултуу
            let currentOptions = Array.from(optionInputs).map(input => input.value);
            let correctIndex = parseInt(correctInput.value);

            // Эгер эч нерсе жазыла элек болсо, аралаштыруунун кажети жок
            if (currentOptions.every(opt => opt.trim() === "")) {
                alert("Аралаштыруу үчүн адегенде варианттарды толтуруңуз!");
                return;
            }

            // Учурдагы туура деп белгиленген жооптун ТЕКСТИН эстеп калабыз
            let correctText = (correctIndex >= 0 && correctIndex < currentOptions.length) ? currentOptions[correctIndex] : null;

            // Fisher-Yates алгоритми менен кокустук тартипте орун алмаштыруу
            for (let i = currentOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentOptions[i], currentOptions[j]] = [currentOptions[j], currentOptions[i]];
            }

            // Аралашкан жаңы тексттерди кайрадан input'торго жазып чыгабыз
            optionInputs.forEach((input, index) => {
                input.value = currentOptions[index];
            });

            // Эгер мурун туура жооп тандалган болсо, анын жаңы ИНДЕКСИН таап ордуна коёбуз
            if (correctText !== null && correctText.trim() !== "") {
                let newCorrectIndex = currentOptions.indexOf(correctText);
                correctInput.value = newCorrectIndex !== -1 ? newCorrectIndex : "";
            } else {
                correctInput.value = ""; // Эгер туура жооп жок болсо же бош болсо тазалайт
            }
        }

        // Суроо өчүрүлгөндө катар номерлерин (#1, #2) автоматтык түрдө кайра иретке келтирүү
        function reindexQuestions() {
            const items = document.querySelectorAll('.question-item');
            questionCount = 0;
            items.forEach(item => {
                questionCount++;
                const p = item.querySelector('.flex justify-between items-center p');
                if (p) p.innerText = `Суроо #${questionCount}`;
            });
        }

        function loadExistingQuizData() {
            database.ref('tests/' + editQuizId).once('value').then(snapshot => {
                const quiz = snapshot.val();
                if(quiz && quiz.authorUid === currentUserId) {
                    document.getElementById('quiz-title-input').value = quiz.title;
                    if(quiz.settings) {
                        document.getElementById('quiz-time').value = quiz.settings.timeLimit || 20;
                        document.getElementById('shuffle-questions').checked = quiz.settings.shuffle || false;
                        document.getElementById('show-results-instantly').checked = quiz.settings.instantResult !== false;
                        document.getElementById('grade-5-min').value = quiz.settings.grade5 || 85;
                        document.getElementById('grade-4-min').value = quiz.settings.grade4 || 70;
                    }
                    if(quiz.questions) {
                        document.getElementById('questions-list').innerHTML = "";
                        questionCount = 0; // Ирек номурду нөлдөп туруп кайра жүктөйбүз
                        quiz.questions.forEach(q => addQuestionField(q.type || 'choice', q.questionText, q.options || [], q.correctAnswer !== undefined ? q.correctAnswer : ""));
                    }
                }
            });
        }

        function saveQuizToFirebase() {
            const title = document.getElementById('quiz-title-input').value.trim();
            if (!title) return alert("Аталышын жазыңыз!");

            const qElements = document.querySelectorAll('.question-item');
            const questions = [];

            qElements.forEach(el => {
                const type = el.getAttribute('data-type');
                const text = el.querySelector('.q-text').value.trim();
                if(type === 'choice') {
                    const opts = Array.from(el.querySelectorAll('.q-opt')).map(i => i.value.trim()).filter(i => i !== "");
                    const correct = parseInt(el.querySelector('.q-correct').value);
                    if (text && opts.length > 0 && !isNaN(correct)) questions.push({ type, questionText: text, options: opts, correctAnswer: correct });
                } else {
                    if (text) questions.push({ type, questionText: text });
                }
            });

            const quizRef = editQuizId ? database.ref('tests/' + editQuizId) : database.ref('tests').push();
            quizRef.set({
                id: editQuizId ? editQuizId : quizRef.key, title: title, authorUid: currentUserId, questions: questions,
                settings: {
                    timeLimit: parseInt(document.getElementById('quiz-time').value),
                    shuffle: document.getElementById('shuffle-questions').checked,
                    instantResult: document.getElementById('show-results-instantly').checked,
                    grade5: parseInt(document.getElementById('grade-5-min').value),
                    grade4: parseInt(document.getElementById('grade-4-min').value)
                }
            }).then(() => { alert("Сакталды!"); window.location.href = "teacher-dashboard.html"; });
        }
    </script>
</body>
</html>
